name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0). Leave blank to read from .csproj'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ── EXE installers — for winget (no code-signing cert required) ─────────────
  build-exe:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: vars
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if (-not $v) {
            [xml]$proj = Get-Content HomeAssistantExtension/HomeAssistantExtension.csproj
            $v = ($proj.Project.PropertyGroup | ForEach-Object { $_.Version } | Where-Object { $_ } | Select-Object -First 1)
            if (-not $v) { $v = '0.0.1' }
          }
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build EXE installer (${{ matrix.arch }})
        shell: pwsh
        run: |
          cd HomeAssistantExtension
          .\build-exe.ps1 -Arch ${{ matrix.arch }} -Version ${{ steps.vars.outputs.version }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.arch }}
          path: HomeAssistantExtension/output/HomeAssistantExtension-${{ steps.vars.outputs.version }}-${{ matrix.arch }}.exe

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-exe]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          v='${{ github.event.inputs.version }}'
          if [ -z "$v" ]; then
            v=$(grep -oP '(?<=<Version>)[^<]+' HomeAssistantExtension/HomeAssistantExtension.csproj | head -1)
            v="${v:-0.0.1}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download EXE installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: Home Assistant Extension v${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: dist/*
